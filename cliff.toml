[changelog]
header = """
# Changelog

All notable changes to this project are documented in this file, generated
automatically from Conventional Commits by git-cliff.

"""
body = """
{% if version %}\
## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
## [Unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group }}
{% for commit in commits %}
- {{ commit.message | upper_first }}{% if commit.remote.pr_number %} ([#{{ commit.remote.pr_number }}](https://github.com/wesleykirkland/terraform-provider-urllo/pull/{{ commit.remote.pr_number }})){% endif %}
{% endfor %}
{% endfor %}
"""
trim = true
footer = ""

[remote.github]
owner = "wesleykirkland"
repo = "terraform-provider-urllo"

[git]
conventional_commits = true
filter_unconventional = true
split_commits = false
sort_commits = "oldest"
filter_commits = true
tag_pattern = "v[0-9]*"
commit_parsers = [
  { message = "^feat", group = "Features" },
  { message = "^fix", group = "Bug Fixes" },
  { message = "^chore", skip = true },
  { message = "^ci", skip = true },
  { message = "^test", skip = true },
  { message = "^docs", skip = true },
  { message = "^style", skip = true },
  { body = ".*[Mm]erge pull request", skip = true },
  { message = ".*", group = "Others" },
]
