# Terraform Provider testing workflow.
name: Tests

# Runs on pull requests only: main is protected and only reachable via a
# merged PR, so a push to main is always a commit these checks already ran
# against and passed - re-running on push would just repeat that same result.
on:
  pull_request:
    paths-ignore:
      - 'README.md'

# Testing only needs permissions to read the repository contents.
permissions:
  contents: read

jobs:
  # Ensure project builds before running testing matrix
  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: 'go.mod'
          cache: true
      - run: go mod download
      - run: go build -v .
      - name: Run linters
        uses: golangci/golangci-lint-action@ba0d7d2ec06a0ea1cb5fa41b2e4a3ab91d21278a # v9.3.0
        with:
          version: latest

  # Unit tests run on every push/PR and require no credentials. Acceptance tests
  # are gated behind TF_ACC, so they do not run here.
  unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read # checkout
      code-quality: write # upload coverage report
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # SonarCloud needs full history for SCM blame / new-code analysis.
          fetch-depth: 0
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: 'go.mod'
          cache: true
      - run: go mod download
      - name: go vet
        run: go vet ./...
      - name: go test (race, cover)
        run: go test -race -cover ./...
      - uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_wrapper: false
          terraform_version: "~1.15"
      # Enforce a coverage floor. The mock-backed acceptance tests run without
      # credentials, so this covers the full CRUD path. See COVERAGE.md.
      - name: coverage gate
        run: make cover
      # Feeds coverage.out (written by `make cover` above) to SonarCloud so
      # the "SonarCloud Code Analysis" check posts on the PR.
      - name: SonarCloud scan
        uses: SonarSource/sonarqube-scan-action@22918119ff8e1ca75a623e15c8296b6ea4fbe28f # v8.2.1
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io
      # Feeds coverage.out (written by `make cover` above) to Codecov for PR
      # coverage reports. fail_ci_if_error defaults to false, so a missing/bad
      # CODECOV_TOKEN warns rather than failing this required check.
      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@5975040f7f7d40edaff8d784b576fd65ae95c073 # v5.5.5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: 'go.mod'
          cache: true
      # We need the latest version of Terraform for our documentation generation to use
      - uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_wrapper: false
          terraform_version: "~1.15"
      - run: make generate
      - name: git diff
        run: |
          git diff --compact-summary --exit-code || \
            (echo; echo "Unexpected difference in directories after code generation. Run 'make generate' command and commit."; exit 1)

  # Run acceptance tests in a matrix with Terraform CLI versions. These require
  # Urllo credentials configured as repository secrets; without them the tests
  # skip themselves.
  test:
    name: 'Acceptance Tests: Terraform ${{ matrix.terraform }}'
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        # Terraform versions
        terraform:
          - '1.13.*'
          - '1.14.*'
          - '1.15.*'
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: 'go.mod'
          cache: true
      - uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_version: ${{ matrix.terraform }}
          terraform_wrapper: false
      - run: go mod download
      - env:
          TF_ACC: "1"
          URLLO_API_KEY: ${{ secrets.URLLO_API_KEY }}
          URLLO_API_SECRET: ${{ secrets.URLLO_API_SECRET }}
          URLLO_TEST_HOST: ${{ vars.URLLO_TEST_HOST }}
        run: go test -v -cover ./internal/provider/
        timeout-minutes: 10
